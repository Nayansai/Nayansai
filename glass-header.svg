<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nayan Sai - AI Engineer, Salesforce Developer, Full Stack">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A12"/>
      <stop offset="0.55" stop-color="#0E0B1E"/>
      <stop offset="1" stop-color="#080814"/>
    </linearGradient>

    <!-- Accent gradient for the name -->
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="0.5" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>

    <!-- Glass panel top highlight -->
    <linearGradient id="glassTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Heavy blur for the frosted orbs -->
    <filter id="frost" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="55"/>
    </filter>

    <!-- Soft glow for accents -->
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <!-- Rounded glass panel clip -->
    <clipPath id="panelClip">
      <rect x="60" y="78" width="1080" height="224" rx="28"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="380" fill="url(#bg)"/>

  <!-- Floating frosted color orbs (drift slowly) -->
  <g filter="url(#frost)" opacity="0.9">
    <circle cx="240" cy="140" r="120" fill="#6366F1">
      <animate attributeName="cx" values="240;300;240" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;190;140" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="260" r="140" fill="#A855F7">
      <animate attributeName="cx" values="640;580;640" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;210;260" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="120" r="130" fill="#22D3EE">
      <animate attributeName="cx" values="980;920;980" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;180;120" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Frosted glass panel -->
  <g clip-path="url(#panelClip)">
    <rect x="60" y="78" width="1080" height="224" rx="28" fill="#FFFFFF" fill-opacity="0.06"/>
    <rect x="60" y="78" width="1080" height="224" rx="28" fill="url(#glassTop)"/>
    <!-- Shimmer sweep -->
    <rect x="-300" y="78" width="300" height="224" fill="url(#shimmer)" transform="skewX(-18)">
      <animate attributeName="x" values="-300;1400" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Glass edge stroke -->
  <rect x="60.5" y="78.5" width="1079" height="223" rx="27.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Eyebrow / role chips -->
  <g font-family="'SFMono-Regular', 'Consolas', 'Menlo', monospace" font-size="13" letter-spacing="1.5">
    <g transform="translate(108, 122)">
      <rect x="0" y="-15" width="118" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.07" stroke="#67E8F9" stroke-opacity="0.35"/>
      <text x="59" y="4" fill="#A5F3FC" text-anchor="middle">AI ENGINEER</text>
    </g>
    <g transform="translate(238, 122)">
      <rect x="0" y="-15" width="148" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.07" stroke="#C4B5FD" stroke-opacity="0.35"/>
      <text x="74" y="4" fill="#DDD6FE" text-anchor="middle">SALESFORCE DEV</text>
    </g>
    <g transform="translate(398, 122)">
      <rect x="0" y="-15" width="118" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.07" stroke="#A5B4FC" stroke-opacity="0.35"/>
      <text x="59" y="4" fill="#C7D2FE" text-anchor="middle">FULL STACK</text>
    </g>
  </g>

  <!-- Name -->
  <text x="106" y="218" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-1" fill="url(#name)" filter="url(#soft)">Nayan Sai</text>

  <!-- Tagline -->
  <text x="110" y="262" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#B4B4D0">Building intelligent, elegant software — from Apex to interfaces.</text>

  <!-- Animated accent underline -->
  <rect x="110" y="278" width="0" height="3" rx="1.5" fill="#67E8F9">
    <animate attributeName="width" values="0;240" dur="1.2s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Status dot -->
  <g transform="translate(955, 116)">
    <circle cx="0" cy="0" r="5" fill="#34D399">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-family="'SFMono-Regular','Consolas',monospace" font-size="12" letter-spacing="1" fill="#6EE7B7">OPEN TO WORK</text>
  </g>
</svg>
